<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLT - Servicios On-Demand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 0; }
        .sidebar { width: 380px; height: 100vh; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); position: relative; z-index: 10; padding: 40px; box-shadow: 20px 0 50px rgba(0,0,0,0.5); overflow-y: auto; }
        .logo { font-weight: 900; font-size: 2.5rem; color: #ffdb15; letter-spacing: -2px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; color: #fff; margin-bottom: 25px; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: #ffdb15; box-shadow: 0 0 15px rgba(255, 219, 21, 0.2); }
        .btn-volt { width: 100%; background: #ffdb15; color: #000; border: none; border-radius: 12px; padding: 18px; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-volt:hover { background: #fff; transform: translateY(-3px); }
        .status-badge { position: absolute; top: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="sidebar">
        <div class="logo">⚡ VOLT</div>
        <div id="request-flow">
            <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter">PEDÍ UN SERVICIO</h2>
            <p class="text-gray-500 mb-8 text-sm">Tu ubicación se detecta automáticamente</p>
            <label class="form-label">TU NOMBRE</label>
            <input type="text" class="form-input" placeholder="Ej: Juan Pérez">
            <label class="form-label">TIPO DE SERVICIO</label>
            <select class="form-input">
                <option>Electricista</option>
                <option>Plomero</option>
            </select>
            <button onclick="alert('Buscando...')" class="btn-volt">⚡ Buscar profesionales</button>
        </div>
    </div>
    <div class="status-badge text-xs font-black uppercase">VOLT — En vivo</div>

    <script>
        const sbUrl = "https://raqtdnjgkspczmjgusai.supabase.co";
        const sbKey = "sb_publishable_xgP0tFJxRms5KUdaRha30Q_0xxQih5K";
        // Fixed Supabase init
        const { createClient } = supabase;
        const client = createClient(sbUrl, sbKey);

        let map = L.map('map', {zoomControl: false}).setView([-38.7183, -62.2663], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    </script>
</body>
</html>
